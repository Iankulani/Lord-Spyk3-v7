apiVersion: v1
kind: Secret
metadata:
  name: spyk3-secrets
  namespace: lord-spyk3
type: Opaque
stringData:
  database-url: "postgresql://spyk3:${POSTGRES_PASSWORD}@postgres:5432/spyk3"
  redis-url: "redis://:${REDIS_PASSWORD}@redis:6379/0"
  secret-key: "${SECRET_KEY}"
  shodan-api-key: "${SHODAN_API_KEY}"
  hunter-api-key: "${HUNTER_API_KEY}"
  discord-token: "${DISCORD_TOKEN}"
  telegram-bot-token: "${TELEGRAM_BOT_TOKEN}"
  slack-bot-token: "${SLACK_BOT_TOKEN}"